name: Bug report
description: Report behavior that is broken or regressed.
title: "fix: "
labels: ["Bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. For security issues, do not open a public issue. Use SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: "Chrome 126, macOS 15"
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshots, recordings, console logs, or sample Markdown.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else maintainers should know?
