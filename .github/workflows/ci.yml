name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check OSS boundary
        run: npm run oss:check

      - name: Check package boundaries
        run: npm run boundary:check

      - name: Check surface colors
        run: npm run test:surface-colors

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
