name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check public surface
        run: npm run surface:check

      - name: Check package boundaries
        run: npm run boundary:check

      - name: Check surface colors
        run: npm run test:surface-colors

      - name: Lint
        run: npm run lint:fast

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check build provenance
        run: npm run check:build-info

      - name: Test production deployment contract
        run: npm run test:production-deploy

      - name: Check published core package
        run: npm run check:core-runtime && node scripts/check-tabula-package.mjs

      - name: Check bundle contract
        run: npm run bundle:check
